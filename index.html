<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RATIO.SCAN</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surf:#141416;--surf2:#1c1c20;--border:#252528;
  --text:#e4e4ea;--muted:#5a5a64;--dim:#2e2e34;
  --green:#00d48a;--green-bg:rgba(0,212,138,0.07);--green-border:rgba(0,212,138,0.25);
  --red:#ff5252;--red-bg:rgba(255,82,82,0.07);--red-border:rgba(255,82,82,0.25);
  --gold:#f0b429;--gold-bg:rgba(240,180,41,0.08);--gold-border:rgba(240,180,41,0.3);
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;padding:2.5rem 2rem}
.app{max-width:720px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.logo{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:500}
.logo span{color:var(--gold)}
.version{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em}
.api-bar{display:flex;align-items:center;gap:10px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.api-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.api-bar input{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none}
.api-bar input:focus{border-color:var(--gold)}
.btn-small{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold);padding:6px 14px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.toggle-key{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px}
.saved{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green);white-space:nowrap;display:none}
.saved.show{display:inline}
.api-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:1.25rem;padding-left:2px}
.api-hint a{color:var(--gold);text-decoration:none}
.search-row{display:flex;gap:10px;margin-bottom:1.75rem}
.ticker-input{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:13px 18px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;outline:none}
.ticker-input::placeholder{color:var(--dim);font-weight:300;font-size:13px;letter-spacing:.02em;text-transform:none}
.ticker-input:focus{border-color:var(--gold)}
.btn-analyze{background:var(--gold);border:none;color:#0c0c0e;padding:13px 26px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-analyze:disabled{opacity:.35;cursor:not-allowed}
.error-box{display:none;background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:12px 16px;color:var(--red);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:1rem}
.error-box.show{display:block}
.loader{display:none;text-align:center;padding:3rem}
.loader.show{display:block}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 1rem}
.loader-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none}
.result.show{display:block}
.company-block{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.company-name{font-size:20px;font-weight:500;letter-spacing:-.01em;margin-bottom:4px}
.company-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.04em}
.section-label{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:2rem}
.metric-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.metric-card.good{border-left:2px solid var(--green);background:var(--green-bg)}
.metric-card.bad{border-left:2px solid var(--red);background:var(--red-bg)}
.metric-label{font-size:10px;font-weight:500;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.metric-value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:400;letter-spacing:-.02em;line-height:1}
.metric-card.good .metric-value{color:var(--green)}
.metric-card.bad .metric-value{color:var(--red)}
.metric-value.na{color:var(--dim);font-size:18px}
.metric-desc{font-size:10px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace}
.footnote{padding-top:1.25rem;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);line-height:1.8}
@media(max-width:500px){body{padding:1.25rem 1rem}.metrics-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">RATIO<span>.</span>SCAN</div>
    <div class="version">v3.0 · Alpha Vantage</div>
  </div>

  <div class="api-bar">
    <span class="api-label">AV Key</span>
    <input id="apiInput" type="password" placeholder="Colle ta clé API Alpha Vantage…">
    <button class="toggle-key" onclick="toggleVis()">👁</button>
    <button class="btn-small" onclick="saveKey()">Enregistrer</button>
    <span class="saved" id="savedBadge">✓ Enregistrée</span>
  </div>
  <div class="api-hint">
    Clé gratuite (25 req/jour) → <a href="https://www.alphavantage.co/support/#api-key" target="_blank">alphavantage.co</a>
  </div>

  <div class="search-row">
    <input type="text" class="ticker-input" id="tickerInput"
      placeholder="Ticker  (ex : AAPL · MSFT · TTE · SAN)"
      maxlength="12" onkeydown="if(event.key==='Enter') analyze()">
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">Analyser →</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">RÉCUPÉRATION DES DONNÉES…</div>
  </div>

  <div class="result" id="result">
    <div class="company-block">
      <div>
        <div class="company-name" id="cName"></div>
        <div class="company-meta" id="cMeta"></div>
      </div>
    </div>
    <div class="section-label">Indicateurs clés · Exercice annuel le plus récent</div>
    <div class="metrics-grid" id="metricsGrid"></div>
    <div class="footnote" id="footnote"></div>
  </div>
</div>

<script>
const BASE = 'https://www.alphavantage.co/query';
let apiKey = localStorage.getItem('av_key') || '';
let keyVisible = false;

if (apiKey) {
  document.getElementById('apiInput').value = '••••••••••••••••••••';
  document.getElementById('savedBadge').classList.add('show');
}

function toggleVis() {
  keyVisible = !keyVisible;
  const inp = document.getElementById('apiInput');
  if (keyVisible && inp.value.includes('•')) inp.value = apiKey;
  inp.type = keyVisible ? 'text' : 'password';
}

function saveKey() {
  const v = document.getElementById('apiInput').value.trim();
  if (!v || v.includes('•')) return;
  apiKey = v;
  localStorage.setItem('av_key', apiKey);
  document.getElementById('apiInput').value = '••••••••••••••••••••';
  document.getElementById('apiInput').type = 'password';
  keyVisible = false;
  document.getElementById('savedBadge').classList.add('show');
}

function n(val) {
  if (val === undefined || val === null || val === 'None' || val === '-' || val === '' || val === 'N/A') return null;
  const num = Number(val);
  return isNaN(num) ? null : num;
}

async function avFetch(params) {
  const url = BASE + '?' + new URLSearchParams({ ...params, apikey: apiKey });
  const r = await fetch(url);
  if (!r.ok) throw new Error('Erreur réseau (' + r.status + ')');
  const d = await r.json();
  if (d['Note']) throw new Error('Limite atteinte (25 req/jour). Réessaie demain.');
  if (d['Information']) throw new Error('Clé invalide ou limite dépassée.');
  return d;
}

async function analyze() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;
  if (!apiKey) { showErr('⚠  Entre et enregistre ta clé API Alpha Vantage.'); return; }

  clearErr();
  document.getElementById('loader').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('analyzeBtn').disabled = true;

  try {
    const overview  = await avFetch({ function: 'OVERVIEW', symbol: ticker });
    if (!overview.Symbol) throw new Error(`Ticker "${ticker}" introuvable.`);

    const income    = await avFetch({ function: 'INCOME_STATEMENT',  symbol: ticker });
    const cashflow  = await avFetch({ function: 'CASH_FLOW',          symbol: ticker });
    const balance   = await avFetch({ function: 'BALANCE_SHEET',      symbol: ticker });

    const inc0 = income.annualReports?.[0]    || {};
    const inc1 = income.annualReports?.[1]    || {};
    const cf0  = cashflow.annualReports?.[0]  || {};
    const cf1  = cashflow.annualReports?.[1]  || {};
    const bs0  = balance.annualReports?.[0]   || {};

    const reportDate = inc0.fiscalDateEnding || '—';

    // Revenue
    const rev0 = n(inc0.totalRevenue);
    const rev1 = n(inc1.totalRevenue);

    // FCF = Operating Cash Flow - CapEx
    const ocf0 = n(cf0.operatingCashflow);
    const cap0 = n(cf0.capitalExpenditures);
    const ocf1 = n(cf1.operatingCashflow);
    const cap1 = n(cf1.capitalExpenditures);
    const fcf0 = (ocf0 !== null && cap0 !== null) ? ocf0 - Math.abs(cap0) : null;
    const fcf1 = (ocf1 !== null && cap1 !== null) ? ocf1 - Math.abs(cap1) : null;

    // Debt & cash
    const longDebt   = n(bs0.longTermDebt) ?? 0;
    const shortDebt  = n(bs0.shortTermDebt) ?? n(bs0.currentLongTermDebt) ?? 0;
    const totalDebt  = longDebt + shortDebt;
    const cash       = n(bs0.cashAndCashEquivalentsAtCarryingValue) ?? n(bs0.cashAndShortTermInvestments) ?? 0;
    const netDebt    = totalDebt - cash;

    // Computed
    const revGrowth  = (rev0 !== null && rev1 !== null && rev1 !== 0) ? (rev0 - rev1) / Math.abs(rev1) : null;
    const fcfGrowth  = (fcf0 !== null && fcf1 !== null && fcf1 !== 0) ? (fcf0 - fcf1) / Math.abs(fcf1) : null;
    const fcfMargin  = (fcf0 !== null && rev0 && rev0 !== 0) ? fcf0 / rev0 : null;
    const netDebtFcf = (fcf0 !== null && fcf0 !== 0) ? netDebt / fcf0 : null;

    // ROIC
    const ebit        = n(inc0.ebit) ?? n(inc0.operatingIncome);
    const taxExp      = n(inc0.incomeTaxExpense);
    const pretax      = n(inc0.incomeBeforeTax);
    const taxRate     = (taxExp !== null && pretax !== null && pretax !== 0) ? taxExp / pretax : 0.21;
    const nopat       = ebit !== null ? ebit * (1 - Math.max(0, Math.min(taxRate, 0.5))) : null;
    const equity      = n(bs0.totalShareholderEquity);
    const invCap      = equity !== null ? equity + totalDebt - cash : null;
    const roic        = (nopat !== null && invCap && invCap !== 0) ? nopat / invCap : null;

    const pe = n(overview.PERatio);

    // Header
    document.getElementById('cName').textContent = overview.Name || ticker;
    document.getElementById('cMeta').textContent = [overview.Exchange, overview.Sector, overview.Country].filter(Boolean).join(' · ');

    // Metric helpers
    function fmtPct(v) { return v === null ? null : (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%'; }
    function fmtX(v)   { return v === null ? null : v.toFixed(2) + 'x'; }
    function fmtNum(v) { return v === null ? null : v.toFixed(1); }
    function cls(raw, type) {
      if (raw === null) return '';
      if (type === 'pe') return '';
      if (type === 'netdebt') return raw < 0 ? 'good' : (raw > 5 ? 'bad' : '');
      return raw > 0 ? 'good' : 'bad';
    }

    const metrics = [
      { label:'Croissance CA',     val: fmtPct(revGrowth),  raw: revGrowth,  type:'growth',  desc:`Revenue Growth YoY · ${reportDate}` },
      { label:'Croissance FCF',    val: fmtPct(fcfGrowth),  raw: fcfGrowth,  type:'growth',  desc:`FCF Growth YoY · ${reportDate}` },
      { label:'ROIC',              val: fmtPct(roic),       raw: roic,       type:'roic',    desc:`Return on Invested Capital · ${reportDate}` },
      { label:'P/E Ratio',         val: fmtNum(pe),         raw: pe,         type:'pe',      desc:`Price / Earnings` },
      { label:'Marge FCF',         val: fmtPct(fcfMargin),  raw: fcfMargin,  type:'margin',  desc:`FCF / Revenue · ${reportDate}` },
      { label:'Dette nette / FCF', val: fmtX(netDebtFcf),   raw: netDebtFcf, type:'netdebt', desc:`Net Debt / FCF · ${netDebt < 0 ? 'Net cash 💚' : 'Leverage'} · ${reportDate}` },
    ];

    document.getElementById('metricsGrid').innerHTML = metrics.map(m => `
      <div class="metric-card ${cls(m.raw, m.type)}">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value ${m.val ? '' : 'na'}">${m.val || 'N/A'}</div>
        <div class="metric-desc">${m.desc}</div>
      </div>
    `).join('');

    document.getElementById('footnote').innerHTML =
      `Source : Alpha Vantage · Ticker : ${ticker} · Données annuelles · ${reportDate}<br>` +
      `FCF = OpCashFlow − CapEx · ROIC = NOPAT / Invested Capital<br>` +
      `Vert/Rouge = signal directionnel uniquement, pas un conseil d'investissement.`;

    document.getElementById('result').classList.add('show');

  } catch(e) {
    showErr('⚠  ' + (e.message || 'Erreur inconnue.'));
  } finally {
    document.getElementById('loader').classList.remove('show');
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function showErr(msg) { const el = document.getElementById('errorBox'); el.textContent = msg; el.classList.add('show'); }
function clearErr()   { document.getElementById('errorBox').classList.remove('show'); }
</script>
</body>
</html>
